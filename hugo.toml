baseURL = "https://predictionprofits.co.uk/"
languageCode = "en-gb"
title = "Prediction Profits"
theme = "PaperMod"
paginate = 10

[params]
  description = "UK guides to prediction markets, crypto passive income, and trading tools. Earn more with your money."
  author = "Prediction Profits"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  ShowWordCount = true
  env = "production"

  [params.homeInfoParams]
    Title = "Profit From Prediction Markets 🇬🇧"
    Content = "The UK's go-to guide for prediction markets, crypto passive income, and trading tools. Real experience, no fluff."

  [[params.socialIcons]]
    name = "twitter"
    url = "https://twitter.com/predprofits"

[menu]
  [[menu.main]]
    identifier = "prediction-markets"
    name = "Prediction Markets"
    url = "/tags/prediction-markets/"
    weight = 10
  [[menu.main]]
    identifier = "crypto-income"
    name = "Crypto Income"
    url = "/tags/crypto-income/"
    weight = 20
  [[menu.main]]
    identifier = "reviews"
    name = "Reviews"
    url = "/tags/reviews/"
    weight = 30
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 40

[taxonomies]
  tag = "tags"
  category = "categories"

[outputs]
  home = ["HTML", "RSS", "JSON"]
