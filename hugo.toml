baseURL = "https://predictionprofits.co.uk/"
languageCode = "en-gb"
title = "Prediction Profits"
theme = "PaperMod"
paginate = 10

[params]
  description = "UK guides to prediction markets, crypto passive income, and trading tools. Real experience, no fluff."
  author = "Prediction Profits"
  defaultTheme = "dark"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  ShowWordCount = true
  env = "production"
  customCSS = ["css/custom.min.css"]

  [params.homeInfoParams]
    Title = "Make Money From Prediction Markets 🇬🇧"
    Content = """The UK's sharpest guide to prediction markets, DeFi yield, and trading tools.
We put real money in. We tell you what works.<br><br>
<a href='/posts/how-to-use-polymarket-uk/' class='btn-primary'>Get Started →</a>
&nbsp;<a href='/posts/polymarket-review-uk-2026/' class='btn-outline'>Read the Review</a>
<div class='pp-stats'>
  <div class='pp-stat'><span class='pp-stat-val'>$3.5B+</span><span class='pp-stat-label'>Polymarket Volume</span></div>
  <div class='pp-stat'><span class='pp-stat-val'>11 Guides</span><span class='pp-stat-label'>Published</span></div>
  <div class='pp-stat'><span class='pp-stat-val'>Free</span><span class='pp-stat-label'>Always</span></div>
</div>
<div class='pp-featured-links'>
  <a href='/posts/best-tools-for-polymarket-uk/'>Best Tools for Polymarket</a>
  <a href='/posts/how-to-buy-usdc-in-the-uk/'>How to Buy USDC in the UK</a>
  <a href='/posts/best-wallet-for-polymarket-uk/'>Best Wallet for Polymarket</a>
  <a href='/posts/coinbase-vs-kraken-for-uk-usdc/'>Coinbase vs Kraken for USDC</a>
  <a href='/posts/how-to-withdraw-polymarket-profits-uk/'>How to Withdraw Profits</a>
  <a href='/posts/best-vpn-for-polymarket-uk/'>Best VPN for Polymarket</a>
</div>"""

  # Twitter removed until @predprofits account is created
  # [[params.socialIcons]]
  #   name = "twitter"
  #   url = "https://twitter.com/predprofits"

  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

[menu]
  [[menu.main]]
    identifier = "prediction-markets-menu"
    name = "Prediction Markets"
    url = "/tags/prediction-markets/"
    weight = 10
  [[menu.main]]
    identifier = "crypto-income-menu"
    name = "Crypto Income"
    url = "/categories/crypto-income/"
    weight = 20
  [[menu.main]]
    identifier = "reviews-menu"
    name = "Reviews"
    url = "/categories/reviews/"
    weight = 30
  [[menu.main]]
    identifier = "about-menu"
    name = "About"
    url = "/about/"
    weight = 40

[taxonomies]
  tag = "tags"
  category = "categories"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

ignoreLogs = ['warning-goldmark-raw-html']
